<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work & Play: Ìjẹṣu — The Yam Festival, Ilara Mokin</title>
<meta name="description" content="A documentary photography exhibition by Ayodeji Tifase. 30 plates from the Ìjẹṣu Yam Festival, Ilara Mokin, Ondo State, Nigeria.">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ink: #0e0d0b;
    --parchment: #f5f0e8;
    --amber: #9a6b2f;
    --amber-light: #c49a52;
    --dust: #d4c4a8;
    --grey: #6e6558;
    --white: #faf8f4;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--ink);
    font-family: 'Jost', sans-serif;
    overflow: hidden;
    cursor: none;
  }

  .cursor {
    position: fixed; width: 8px; height: 8px;
    background: var(--amber-light); border-radius: 50%;
    pointer-events: none; z-index: 9999;
    transform: translate(-50%, -50%);
    mix-blend-mode: difference;
  }
  .cursor-ring {
    position: fixed; width: 36px; height: 36px;
    border: 1px solid rgba(196,154,82,0.5); border-radius: 50%;
    pointer-events: none; z-index: 9998;
    transform: translate(-50%, -50%);
    transition: all .12s ease-out;
  }
  .cursor-ring.hovering { width: 60px; height: 60px; border-color: var(--amber-light); }

  #intro {
    position: fixed; inset: 0; background: var(--ink);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100; transition: opacity 1.2s ease, visibility 1.2s;
  }
  #intro.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  .intro-rule {
    width: 0; height: 1px; background: var(--amber);
    margin-bottom: 3rem; transition: width 1.4s ease;
  }
  .intro-rule.expanded { width: 120px; }

  .intro-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.2rem, 5vw, 4rem); font-weight: 300;
    color: var(--parchment); letter-spacing: 0.08em;
    text-align: center; opacity: 0; transform: translateY(20px);
    transition: opacity 1s ease .4s, transform 1s ease .4s; line-height: 1.2;
  }
  .intro-title.visible { opacity: 1; transform: translateY(0); }

  .intro-sub {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1rem, 2vw, 1.4rem); font-weight: 300; font-style: italic;
    color: var(--amber-light); margin-top: .8rem; letter-spacing: 0.06em;
    opacity: 0; transition: opacity 1s ease .8s; text-align: center;
  }
  .intro-sub.visible { opacity: 1; }

  .intro-meta {
    margin-top: 2.5rem; font-size: .72rem; font-weight: 200;
    letter-spacing: .2em; text-transform: uppercase; color: var(--grey);
    opacity: 0; transition: opacity 1s ease 1.2s; text-align: center;
  }
  .intro-meta.visible { opacity: 1; }

  .enter-btn {
    margin-top: 3.5rem; background: none; border: 1px solid var(--amber);
    color: var(--amber-light); font-family: 'Jost', sans-serif;
    font-size: .75rem; font-weight: 300; letter-spacing: .25em;
    text-transform: uppercase; padding: .9rem 2.8rem; cursor: none;
    opacity: 0; transition: opacity 1s ease 1.6s, background .3s, color .3s;
    position: relative; overflow: hidden;
  }
  .enter-btn::after {
    content: ''; position: absolute; inset: 0; background: var(--amber);
    transform: translateX(-100%); transition: transform .4s ease; z-index: -1;
  }
  .enter-btn:hover::after { transform: translateX(0); }
  .enter-btn:hover { color: var(--ink); }
  .enter-btn.visible { opacity: 1; }

  #gallery { position: fixed; inset: 0; opacity: 0; transition: opacity 1.2s ease; }
  #gallery.visible { opacity: 1; }
  #slides { position: absolute; inset: 0; }

  .slide {
    position: absolute; inset: 0; display: flex;
    opacity: 0; pointer-events: none; transition: none;
  }
  .slide.active { opacity: 1; pointer-events: all; }

  .slide-image { position: absolute; inset: 0; background: var(--ink); }
  .photo-area {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .photo-placeholder { width: 100%; height: 100%; position: relative; overflow: hidden; }
  .photo-placeholder img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .photo-vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(14,13,11,0.65) 100%);
    pointer-events: none;
  }

  .caption-panel {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(14,13,11,0.97) 0%, rgba(14,13,11,0.92) 60%, transparent 100%);
    padding: clamp(2rem,5vw,4rem) clamp(2rem,8vw,7rem) clamp(1.5rem,3vw,2.5rem);
  }
  .plate-label {
    font-size: .65rem; font-weight: 300; letter-spacing: .3em;
    text-transform: uppercase; color: var(--amber); margin-bottom: .6rem;
    opacity: 0; transform: translateY(12px);
    transition: opacity .7s ease .3s, transform .7s ease .3s;
  }
  .slide.active .plate-label { opacity: 1; transform: translateY(0); }
  .plate-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.6rem, 3.5vw, 3rem); font-weight: 300;
    color: var(--parchment); line-height: 1.15; margin-bottom: 1rem;
    opacity: 0; transform: translateY(14px);
    transition: opacity .7s ease .45s, transform .7s ease .45s;
  }
  .slide.active .plate-title { opacity: 1; transform: translateY(0); }
  .caption-rule {
    width: 0; height: 1px; background: var(--amber); margin-bottom: 1rem;
    transition: width .8s ease .6s;
  }
  .slide.active .caption-rule { width: 60px; }
  .plate-caption {
    font-size: clamp(.78rem, 1.3vw, .95rem); font-weight: 300;
    line-height: 1.75; color: var(--dust); max-width: 680px;
    opacity: 0; transform: translateY(10px);
    transition: opacity .7s ease .75s, transform .7s ease .75s;
  }
  .slide.active .plate-caption { opacity: 1; transform: translateY(0); }

  .nav-prev, .nav-next {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: none; z-index: 50;
    padding: 1.5rem 1rem; opacity: .4; transition: opacity .3s;
    display: flex; align-items: center; gap: .5rem;
  }
  .nav-prev:hover, .nav-next:hover { opacity: 1; }
  .nav-prev { left: 1.5rem; } .nav-next { right: 1.5rem; }
  .nav-arrow { width: 42px; height: 1px; background: var(--parchment); position: relative; }
  .nav-arrow::after {
    content: ''; position: absolute; top: -4px; width: 8px; height: 8px;
    border-top: 1px solid var(--parchment); border-right: 1px solid var(--parchment);
  }
  .nav-prev .nav-arrow::after { left: 0; transform: rotate(-135deg); }
  .nav-next .nav-arrow::after { right: 0; transform: rotate(45deg); }

  .top-bar {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 1.5rem clamp(1.5rem,4vw,3.5rem);
    display: flex; align-items: center; justify-content: space-between; z-index: 40;
    background: linear-gradient(to bottom, rgba(14,13,11,0.7) 0%, transparent 100%);
  }
  .top-series { font-size: .65rem; font-weight: 200; letter-spacing: .25em; text-transform: uppercase; color: var(--grey); }
  .top-counter { font-family: 'Cormorant Garamond', serif; font-size: .9rem; font-weight: 300; color: var(--grey); letter-spacing: .1em; }
  .top-counter span { color: var(--amber-light); }

  .progress-bar { position: absolute; bottom: 0; left: 0; height: 2px; background: var(--amber); transition: width .6s ease; z-index: 60; }

  .dot-nav {
    position: absolute; top: 50%; right: 1.2rem; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: .35rem;
    z-index: 50; opacity: .35; transition: opacity .3s;
  }
  .dot-nav:hover { opacity: 1; }
  .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--dust); cursor: none; transition: background .3s, transform .3s; }
  .dot.active { background: var(--amber-light); transform: scale(1.6); }

  .swipe-hint {
    position: absolute; bottom: 7rem; left: 50%; transform: translateX(-50%);
    font-size: .65rem; letter-spacing: .25em; text-transform: uppercase; color: var(--grey);
    opacity: 0; animation: hintFade 2s ease 3s forwards; white-space: nowrap; z-index: 50;
  }
  @keyframes hintFade { 0% { opacity: 0; } 30% { opacity: .6; } 70% { opacity: .6; } 100% { opacity: 0; } }

  .slide.trans-out { animation: transOut .9s cubic-bezier(.4,0,.2,1) forwards; }
  .slide.trans-in { animation: transIn .9s cubic-bezier(.4,0,.2,1) forwards; }
  .slide.trans-out-left { animation: transOutLeft .9s cubic-bezier(.4,0,.2,1) forwards; }
  .slide.trans-in-right { animation: transInRight .9s cubic-bezier(.4,0,.2,1) forwards; }

  @keyframes transOut { 0% { opacity:1; transform:scale(1); } 100% { opacity:0; transform:scale(1.03); } }
  @keyframes transIn { 0% { opacity:0; transform:scale(.97); } 100% { opacity:1; transform:scale(1); } }
  @keyframes transOutLeft { 0% { opacity:1; transform:translateX(0); } 100% { opacity:0; transform:translateX(-4%); } }
  @keyframes transInRight { 0% { opacity:0; transform:translateX(4%); } 100% { opacity:1; transform:translateX(0); } }

  .cover-slide {
    background: var(--ink); display: flex; align-items: center; justify-content: center;
    flex-direction: column; text-align: center; position: absolute; inset: 0; gap: 0;
  }
  .cover-rule-top, .cover-rule-bottom { width: 80px; height: 1px; background: var(--amber); margin: 2rem 0; opacity: .7; }
  .cover-heading { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem, 6vw, 5.5rem); font-weight: 300; color: var(--parchment); letter-spacing: .06em; line-height: 1.1; }
  .cover-subtitle { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: clamp(1.1rem, 2.5vw, 1.8rem); color: var(--amber-light); letter-spacing: .06em; margin-bottom: .4rem; }
  .cover-byline { font-size: .7rem; font-weight: 200; letter-spacing: .2em; text-transform: uppercase; color: var(--grey); line-height: 2; }
  .cover-plates-count { margin-top: 2.5rem; font-size: .65rem; letter-spacing: .3em; text-transform: uppercase; color: rgba(154,107,47,.5); }
  .cover-enter { margin-top: 3rem; font-size: .7rem; letter-spacing: .3em; text-transform: uppercase; color: var(--amber); display: flex; align-items: center; gap: 1rem; animation: pulse 2.5s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: .5; } 50% { opacity: 1; } }
  .cover-enter::after { content: ''; display: block; width: 30px; height: 1px; background: var(--amber); }

  #grain { position: fixed; inset: 0; pointer-events: none; z-index: 200; opacity: .04; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size: 200px; }
  .kb-hint { position: absolute; bottom: 1.2rem; right: clamp(1.5rem,4vw,3.5rem); font-size: .6rem; letter-spacing: .15em; color: rgba(110,101,88,0.4); z-index: 50; }

  @media (hover: none) {
    .cursor, .cursor-ring { display: none; }
    html, body { cursor: auto; }
    .enter-btn, .nav-prev, .nav-next, .dot { cursor: pointer; }
  }
</style>
</head>
<body>

<div id="grain"></div>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<div id="intro">
  <div class="intro-rule" id="introRule"></div>
  <div class="intro-title" id="introTitle">WORK & PLAY: ÌJẸṢU</div>
  <div class="intro-sub" id="introSub">The Yam Festival, Ilara Mokin</div>
  <div class="intro-meta" id="introMeta">Documentary Photography &nbsp;·&nbsp; Ondo State, Nigeria &nbsp;·&nbsp; 2022</div>
  <button class="enter-btn" id="enterBtn" onclick="enterGallery()">Enter Exhibition</button>
</div>

<div id="gallery">
  <div id="slides"></div>
  <div class="top-bar">
    <div class="top-series">Work & Play: Ìjẹṣu</div>
    <div class="top-counter"><span id="currentNum">01</span> — <span id="totalNum">32</span></div>
  </div>
  <button class="nav-prev" id="navPrev" onclick="navigate(-1)"><div class="nav-arrow"></div></button>
  <button class="nav-next" id="navNext" onclick="navigate(1)"><div class="nav-arrow"></div></button>
  <div class="dot-nav" id="dotNav"></div>
  <div class="progress-bar" id="progressBar"></div>
  <div class="swipe-hint">Swipe or use arrow keys to navigate</div>
  <div class="kb-hint">← → keys &nbsp;·&nbsp; swipe &nbsp;·&nbsp; click arrows</div>
</div>

<script>
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
(function animateCursor(){
  rx+=(mx-rx)*0.14;ry+=(my-ry)*0.14;
  cursor.style.left=mx+'px';cursor.style.top=my+'px';
  ring.style.left=rx+'px';ring.style.top=ry+'px';
  requestAnimationFrame(animateCursor);
})();

window.addEventListener('load',()=>{
  setTimeout(()=>document.getElementById('introRule').classList.add('expanded'),200);
  setTimeout(()=>document.getElementById('introTitle').classList.add('visible'),300);
  setTimeout(()=>document.getElementById('introSub').classList.add('visible'),500);
  setTimeout(()=>document.getElementById('introMeta').classList.add('visible'),700);
  setTimeout(()=>document.getElementById('enterBtn').classList.add('visible'),900);
});

function enterGallery(){
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('gallery').classList.add('visible');
  setTimeout(()=>showSlide(0,'none'),600);
}

// ── PLATE DATA ──────────────────────────────────────────────────────────────
// Each plate has: img (filename), title, caption
// The img filename must EXACTLY match the photo file in your folder
const plates = [
  { type: 'cover' },

  { num:'01', img:'img-111.jpg', title:'Before the Ground Was Ready',
    caption:'An empty bamboo table, hand-built from the forest\'s raw material, stands on the scrubland at Ilara Mokin before the Ìjẹṣu festival has begun. Behind it, the signature pyramid of harvested yam tubers already announces the day\'s cultural purpose. The image captures the interval of anticipation — a moment of constructed silence before the crowd, the machines, and the ceremonies arrive.' },

  { num:'02', img:'img-110.jpg', title:'The Harvest Stands Alone',
    caption:'A ceremonial mound of yams piled in a pyramid on the open grassland at Ilara Mokin. In Ìjẹṣu cultural tradition, the yam harvest marks the close of a spiritual and agrarian cycle — the earth\'s covenant with those who work it. The low-angle framing allows the mound to dominate the sky, investing it with the monumental quality of a cultural offering.' },

  { num:'03', img:'img-067.jpg', title:'Mound and Its Witnesses',
    caption:'Photographed at ground level, the yam mound fills the frame entirely, individual tubers rendered with textural clarity. The shallow depth of field dissolves the crowd gathered behind into colour, suggesting witness without specificity. Within the Ìjẹṣu festival tradition, the communal viewing of the displayed yam is an act of acknowledgement: the community affirms abundance and ratifies continuity with the land.' },

  { num:'04', img:'img-058.jpg', title:'The Table Laid With Fire',
    caption:'A long bamboo table recedes from the foreground, each setting marked by a calabash of egusi soup on a red-rimmed enamel plate beside a sealed water bottle — the competition\'s provisions. The image argues that the Ìjẹṣu festival\'s food presentation is not simply sustenance but a designed ritual language, in which vessel, colour, arrangement, and scale all carry meaning.' },

  { num:'05', img:'img-084.jpg', title:'Marshals of the Event',
    caption:'A line of young men in orange and yellow safety vests receives instructions from a production coordinator. Their posture communicates the seriousness of organised community labour. The Ìjẹṣu festival does not simply happen — it is built, staffed, and managed by young people from the same community it serves.' },

  { num:'06', img:'img-093.jpg', title:'Built Not Bought',
    caption:'The bonnet of a race-prepped Nissan 350Z stands open, revealing a heavily modified turbocharged engine bay in red and aluminium. Across the front bumper in large red capitals: BUILT NOT BOUGHT. The phrase functions simultaneously as a mechanic\'s philosophy and a cultural statement — a claim about the dignity of making that resonates far beyond motorsport.' },

  { num:'07', img:'img-005.jpg', title:'Between Two Languages',
    caption:'A Nigerian MC interviews a European motorsport driver who stands relaxed against the side of his sports car, arms folded, smiling. Work and Play Nigeria built the Ìjẹṣu festival as a platform where Ondo State could host and engage with practitioners from outside in front of its own community.' },

  { num:'08', img:'img-087.jpg', title:'The Machines at Rest',
    caption:'An orange off-road buggy and a lime-green buggy are parked side by side on the dry grass field, the Ondo forest behind them dense and saturated. The contrast between the vivid synthetic colours of motorsport machinery and the biological greens of the forest is one of this exhibition\'s recurring visual tensions: the contemporary and the ancient sharing the same ground, neither diminishing the other.' },

  { num:'09', img:'img-000.jpg', title:'Orange Across the Hill',
    caption:'An orange dune buggy crests a red-earth hill, the watching crowd strung along the ridge above in a broad arc. The motion of the vehicle is felt rather than frozen, and the crowd\'s attentiveness makes the observation mutual: machine and audience read each other. A community claiming ownership of a new kind of cultural spectacle on inherited ground.' },

  { num:'10', img:'img-112.jpg', title:'Green Against the Field',
    caption:'A green off-road buggy accelerates hard through the grassland course, bathed in warm amber light. Motion — of vehicles, of music, of cooking, of celebration — was the unifying grammar of the day. Work and Play Nigeria brought not simply a display but a dynamic event, experienced physically by its audience.' },

  { num:'11', img:'img-099.jpg', title:'Thunder in the Forest',
    caption:'The drift car named The Thunder turns in a low drift on the Ilara Mokin circuit, exhaust smoke beginning to rise. The event changed the acoustic landscape of the town for a day. In Yoruba cosmology, thunder is associated with Ṣàngó — power, justice, and the irresistible force of consequence.' },

  { num:'12', img:'img-012.jpg', title:'The Drift and Its Geometry',
    caption:'The drift car turns in a long, controlled arc on the sealed circuit, white smoke pouring from the rear tyres, scorch marks inscribed as dark curves across the tarmac. The image reads as a calligraphic gesture: the car drawing its signature in rubber and smoke. What is recorded is not simply a stunt but a craft — one that requires precision control at the edge of physics.' },

  { num:'13', img:'img-007.jpg', title:'The Cloud Speaks First',
    caption:'The drift car performs before a large crowd, exhaust smoke expanding to fill the lower half of the frame. The building\'s domestic architecture — yellow render, tiled roof — anchors the scene in an ordinary Nigerian landscape, against which the spectacle appears even more extraordinary.' },

  { num:'14', img:'img-081.jpg', title:'Dust, Gold, and Speed',
    caption:'A stripped-back racing buggy drifts through a turn, a golden cloud of disturbed earth rising behind it. The warm palette of dust and sunlight transforms what could be a documentary record into something closer to landscape painting. This is motorsport as ecology — the intervention of the technological into the natural.' },

  { num:'15', img:'img-015.jpg', title:'One Man and a Voice',
    caption:'A man in a magenta event polo shirt addresses the gathering from an open stage, his right hand extended towards the Ondo hills in deep green. The hills are the Ìjẹṣu heartland, the specific geography that gives this gathering its cultural authority. Contemporary cultural production in Nigeria speaks from a specific place, towards a community that knows exactly where it is.' },

  { num:'16', img:'img-018.jpg', title:'The Elder Addresses the Ground',
    caption:'An elderly woman in full green and white Ankara attire speaks into a microphone, a younger man applauding beside her. This is a generational conversation made visible. Within the Ìjẹṣu cultural framework, the voices of the elderly carry specific ritual authority — they are living archives of continuity.' },

  { num:'17', img:'img-120.jpg', title:'The Woman Who Received',
    caption:'The same elder in green Ankara faces the camera as a certificate is handed to her at the ceremony\'s award moment. In Yoruba tradition, the gift of recognition carries social weight that extends beyond the document itself — it is a public act of attestation, witnessed by the community.' },

  { num:'18', img:'img-171.jpg', title:'A Man Worth Knowing',
    caption:'An elder man of distinguished age is seated in a striped Yoruba aso-oke, his hands composed in his lap, the lush green hills of Ondo State rising behind him. The aso-oke is traditional festival attire, worn by community elders who have earned the right to receive, not merely to attend. His quiet dignity is this exhibition\'s emotional anchor.' },

  { num:'19', img:'img-172.jpg', title:'The Eye That Has Seen Much',
    caption:'A bespectacled elder man in a vivid blue and gold Ankara shirt sits among the gathering, his gaze directed steadily to camera, composed and still. The Ìjẹṣu Yam Festival in its traditional iteration belonged to elders like this man — they held the knowledge of the calendar, the ritual, and the story of why the harvest was celebrated.' },

  { num:'20', img:'img-170.jpg', title:'Watching the New Thing',
    caption:'A senior man in a deep maroon Yoruba kaftan sits under a green umbrella, his expression one of contemplative observation. He is not a bystander; he is a custodian watching whether the new thing honours what came before it.' },

  { num:'21', img:'img-068.jpg', title:'In Conference With Tradition',
    caption:'An MC crouches low to hold a microphone towards an elder dressed in pink and green Ankara, seated cross-legged on a woven mat. The physical posture — the younger man lowering himself to the elder\'s level — is a communicative act as much as a recording one. This is the interview as ceremony.' },

  { num:'22', img:'img-090.jpg', title:'The Agbada Arrives',
    caption:'A man strides with unhurried authority in a sweeping light blue agbada — the traditional Yoruba ceremonial robe whose wide sleeves catch the air as he moves. Tradition does not recede when the contemporary arrives — it simply decides how it will be seen.' },

  { num:'23', img:'img-127.jpg', title:'Competitors at the Line',
    caption:'Three male competitors in the Pounded Yam Challenge stand at the bamboo table before the contest begins, their blue chef\'s hats and aprons marking them as participants in the formal structure of the food ceremony. The Pounded Yam Challenge translated heritage food practice into competitive entertainment.' },

  { num:'24', img:'img-136.jpg', title:'In the Act of Eating',
    caption:'Three competitors shown mid-contest: the nearest figure leans forward, a piece of pounded yam in his hands, egusi on his chin — fully and unselfconsciously inside the act of eating. The image captures what the Pounded Yam Challenge was really asking: whether an act of cultural intimacy could be made communally spectacular. The answer visible here is yes.' },

  { num:'25', img:'img-027.jpg', title:'The Wrapped Gift of the Earth',
    caption:'A sole competitor bends in total concentration over his portion of pounded yam wrapped in banana leaves. The wrapping of food in leaf is one of the oldest practices in Yoruba culinary culture. That it appears here, unchanged, at a contemporary entertainment event in the presence of drift cars and electric speakers, is this exhibition\'s deepest subject.' },

  { num:'26', img:'img-079.jpg', title:'The Mortar Remembers',
    caption:'A wooden mortar, its interior stained with use, holds a pestle and freshly pounded white yam. The mortar is old in a way that most objects at this event were not — worn smooth, accumulated with time, shaped not by design but by use repeated across many years. In Yoruba material culture, the mortar is a domestic instrument of near-sacred standing.' },

  { num:'27', img:'img-122.jpg', title:'The Winner Holds the Earth',
    caption:'The 2022 Pounded Yam Challenge winner stands before the stage gantry, holding the gold trophy in one hand and his prize envelope in the other. The trophy is gold but the prize is cultural — belonging, recognition, and the right to be remembered in the community\'s account of the day.' },

  { num:'28', img:'img-123.jpg', title:'The Trophy Changes Hands',
    caption:'The trophy is passed from a community dignitary in deep maroon Yoruba fabric and kufi cap to the winning competitor, the gold cup suspended between their hands. The transfer is a cultural transaction: the community acknowledges individual excellence within a collective achievement.' },

  { num:'29', img:'img-031.jpg', title:'They Came and They Roared',
    caption:'A dense crowd of young people erupts in collective noise, arms raised, faces wide with laughter and shouting. This is what cultural production at its best looks like in Nigeria: not an audience passively consuming a product but a community claiming an occasion as its own.' },

  { num:'30', img:'img-022.jpg', title:'All of Us on the Hill',
    caption:'From an elevated viewpoint, the full expanse of the Ìjẹṣu festival ground is visible: crowd, bamboo tables, the yam mound at centre, the Ondo hills rising behind everything. Not a moment of action or portraiture but a survey — a documentary account of an entire community gathered in one place, at one time, on land they know, around a harvest they have grown, in celebration of who they are.' },

  {
    type: 'closing',
    heading: 'Work &amp; Play: Ìjẹṣu',
    sub: 'The Yam Festival, Ilara Mokin',
    body: 'This exhibition documents a singular moment in the life of a community: the day a centuries-old harvest ceremony and a contemporary motorsport showcase shared the same red-earth ground in Ondo State, and neither diminished the other.',
    credits: [
      ['Series', 'Work &amp; Play: Ìjẹṣu — The Yam Festival, Ilara Mokin'],
      ['Location', 'Ilara Mokin, Ondo State, Nigeria'],
      ['Production', 'Work and Play Nigeria'],
      ['Creative Director &amp; Producer', 'Ayodeji Tifase'],
      ['Director of Photography', 'Ayodeji Tifase'],
      ['Plates', '30 · Gallery Exhibition Series'],
    ]
  }
];

const total = plates.length;
let current = 0;
let isAnimating = false;
const slidesEl = document.getElementById('slides');
const dotNav = document.getElementById('dotNav');

plates.forEach((p, i) => {
  const s = document.createElement('div');
  s.className = 'slide';
  s.dataset.index = i;

  if (p.type === 'cover') {
    s.innerHTML = `<div class="cover-slide">
      <div class="cover-rule-top"></div>
      <div class="cover-heading">WORK &amp; PLAY<br>ÌJẸṢU</div>
      <div class="cover-subtitle">The Yam Festival, Ilara Mokin</div>
      <div class="cover-rule-bottom"></div>
      <div class="cover-byline">Produced by Work and Play Nigeria, Ondo State<br>Creative Director &amp; Producer: Ayodeji Tifase</div>
      <div class="cover-plates-count">30 Exhibition Plates</div>
      <div class="cover-enter">Begin</div>
    </div>`;
  } else if (p.type === 'closing') {
    s.innerHTML = `<div class="cover-slide">
      <div class="cover-rule-top" style="background:var(--amber);"></div>
      <div class="cover-heading" style="font-size:clamp(1.8rem,4vw,3.5rem);letter-spacing:.12em;">${p.heading}</div>
      <div class="cover-subtitle">${p.sub}</div>
      <div class="cover-rule-bottom" style="background:var(--amber);"></div>
      <div style="max-width:560px;text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(.9rem,1.6vw,1.2rem);color:var(--dust);line-height:1.75;margin-bottom:2rem;">${p.body}</div>
      <div style="display:flex;flex-direction:column;gap:.4rem;width:100%;max-width:480px;">
        ${p.credits.map(([l,v]) => `<div style="display:flex;gap:1rem;font-size:.7rem;letter-spacing:.08em;"><span style="color:var(--amber);min-width:170px;text-align:right;">${l}</span><span style="color:var(--grey)">${v}</span></div>`).join('')}
      </div>
    </div>`;
  } else {
    // ── THIS IS THE KEY PART: each plate uses p.img — its OWN filename ──
    s.innerHTML = `<div class="slide-image">
      <div class="photo-area">
        <div class="photo-placeholder">
          <img src="${p.img}" alt="${p.title}" style="width:100%;height:100%;object-fit:cover;display:block;">
          <div class="photo-vignette"></div>
        </div>
      </div>
      <div class="caption-panel">
        <div class="plate-label">Plate ${p.num} &nbsp;·&nbsp; Work &amp; Play: Ìjẹṣu</div>
        <div class="plate-title">${p.title}</div>
        <div class="caption-rule"></div>
        <div class="plate-caption">${p.caption}</div>
      </div>
    </div>`;
  }
  slidesEl.appendChild(s);

  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.dataset.index = i;
  dot.addEventListener('click', () => goTo(i));
  dotNav.appendChild(dot);
});

document.getElementById('totalNum').textContent = String(total).padStart(2,'0');

function showSlide(index, direction) {
  if (isAnimating) return;
  const allSlides = document.querySelectorAll('.slide');
  const dots = document.querySelectorAll('.dot');
  const prev = current;
  current = Math.max(0, Math.min(total - 1, index));
  document.getElementById('currentNum').textContent = String(current + 1).padStart(2,'0');
  document.getElementById('progressBar').style.width = ((current / (total - 1)) * 100) + '%';
  dots.forEach((d, i) => d.classList.toggle('active', i === current));
  if (direction === 'none') {
    allSlides[prev]?.classList.remove('active');
    allSlides[current].classList.add('active');
    return;
  }
  isAnimating = true;
  const outAnim = direction === 'next' ? 'trans-out' : 'trans-out-left';
  const inAnim  = direction === 'next' ? 'trans-in-right' : 'trans-in';
  allSlides[prev].classList.add(outAnim);
  allSlides[current].classList.add(inAnim);
  allSlides[current].classList.add('active');
  setTimeout(() => {
    allSlides[prev].classList.remove('active', outAnim);
    allSlides[current].classList.remove(inAnim);
    isAnimating = false;
  }, 900);
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= total) return;
  showSlide(next, dir > 0 ? 'next' : 'prev');
}
function goTo(i) { showSlide(i, i > current ? 'next' : 'prev'); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
});

let touchX = null;
document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 50) navigate(dx < 0 ? 1 : -1);
  touchX = null;
}, { passive: true });

document.getElementById('slides').addEventListener('click', e => {
  const inNav = e.target.closest('#navPrev') || e.target.closest('#navNext') || e.target.closest('.dot-nav');
  if (!inNav) {
    const rect = document.getElementById('slides').getBoundingClientRect();
    navigate(e.clientX > rect.width * 0.5 ? 1 : -1);
  }
});

document.querySelectorAll('button, .dot').forEach(el => {
  el.addEventListener('mouseenter', () => ring.classList.add('hovering'));
  el.addEventListener('mouseleave', () => ring.classList.remove('hovering'));
});
</script>
</body>
</html>
